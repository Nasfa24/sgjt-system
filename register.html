<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar ARUS</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#25d366">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .alert-box {
            background: #ffecec; border-left: 4px solid #ff5f6d;
            padding: 15px; border-radius: 8px; margin-bottom: 20px;
            font-size: 0.85rem; color: #d63031; line-height: 1.4;
            display: flex; align-items: start;
        }
        .alert-icon { font-size: 1.2rem; margin-right: 10px; }
        
        select optgroup { font-weight: bold; color: #666; }
        select option { font-weight: normal; color: #333; }
    </style>
</head>
<body>
    <div id="loading-overlay"><div class="wave-spinner"></div></div>
    <div id="toast-container"></div>

    <div class="container">
        <div class="brand-header">
            <div class="brand-logo">ARUS 🌊</div>
            <p>Upline: <strong id="upline-name" style="color:var(--primary);">Memuat...</strong></p>
        </div>

        <form id="registerForm" class="card">
            
            <div class="alert-box">
                <div class="alert-icon">⚠️</div>
                <div>
                    <strong>PERHATIAN: Kebijakan Anti-Fraud</strong><br>
                    1 Nomor Rekening / E-Wallet dan WhatsApp hanya berlaku untuk <strong>1 Akun</strong>. Sistem otomatis memblokir data ganda.
                </div>
            </div>

            <label style="font-weight:600; margin-bottom:5px; display:block;">Data Diri</label>
            <input type="text" id="nama" placeholder="Nama Lengkap" required>
            <input type="email" id="email" placeholder="Email Aktif" required>
            <input type="password" id="password" placeholder="Password (Min 6 digit)" required>
            
            <hr style="border:0; border-top:1px dashed #ddd; margin:15px 0;">

            <label style="font-weight:600; margin-bottom:5px; display:block;">Info Penerima Dana</label>
            
            <select id="bank" required style="font-weight:bold; color:var(--dark);">
                <option value="" disabled selected>-- Pilih Bank / E-Wallet --</option>
                <optgroup label="💳 Transfer Bank">
                    <option value="BCA">BCA</option>
                    <option value="BRI">BRI</option>
                    <option value="MANDIRI">Mandiri</option>
                    <option value="BNI">BNI</option>
                    <option value="BSI">BSI</option>
                </optgroup>
                <optgroup label="📱 E-Wallet">
                    <option value="DANA">DANA</option>
                    <option value="GOPAY">GoPay</option>
                    <option value="OVO">OVO</option>
                    <option value="SHOPEEPAY">ShopeePay</option>
                </optgroup>
            </select>
            
            <input type="number" id="rekening" placeholder="No. Rekening / No. E-Wallet" required>
            <input type="number" id="whatsapp" placeholder="No WhatsApp (Contoh: 0812xxxx)" required>
            
            <button type="submit" id="btnDaftar" disabled>Gabung Sekarang</button>
        </form>
        
        <p style="text-align:center;">Sudah punya akun? <a href="login.html" style="font-weight:bold; color:var(--primary);">Login</a></p>
    </div>

    <script type="module">
        import { supabase, showToast, monitorAuthState } from './app.js';

        const refCode = new URLSearchParams(window.location.search).get('ref');
        let isRegistering = false; 

        monitorAuthState((user) => { 
            if(user && !isRegistering) window.location.href="dashboard.html"; 
        });

        (async () => {
            if(!refCode) {
                document.getElementById('upline-name').innerText = "TIDAK ADA (ERROR)";
                showToast("⚠️ Akses via Halaman Depan!", "error");
                setTimeout(() => window.location.href = "index.html", 2000);
                return;
            }
            
            try {
                // SUPABASE: Ambil data Upline
                const { data, error } = await supabase.from('users').select('nama').eq('id', refCode).single();
                if (data) {
                    document.getElementById('upline-name').innerText = data.nama;
                    document.getElementById('btnDaftar').disabled = false;
                } else { 
                    document.getElementById('upline-name').innerText = "KODE TIDAK VALID";
                    showToast("Kode Upline Salah!", "error"); 
                }
            } catch (e) { showToast("Gagal memuat Upline", "error"); }
        })();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnDaftar');
            
            const nama = document.getElementById('nama').value;
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const bank = document.getElementById('bank').value; 
            const rek = document.getElementById('rekening').value;
            let waInput = document.getElementById('whatsapp').value; 

            if(!nama || !email || !pass || !bank || !rek || !waInput) return showToast("Isi semua data!", "error");

            let waClean = waInput.replace(/[^0-9]/g, '');
            if (waClean.startsWith('0')) waClean = '62' + waClean.slice(1);
            const waFinal = waClean; 

            btn.innerText = "Mengecek Data..."; btn.disabled = true;
            isRegistering = true; 

            try {
                // SUPABASE: Cek duplikat rekening & WA
                const { data: cekRek } = await supabase.from('users').select('id').eq('rekening', rek);
                if (cekRek && cekRek.length > 0) throw new Error("⛔ GAGAL: Nomor Rekening/E-Wallet ini SUDAH TERDAFTAR!");

                const { data: cekWa } = await supabase.from('users').select('id').eq('no_wa', waFinal);
                if (cekWa && cekWa.length > 0) throw new Error("⛔ GAGAL: Nomor WhatsApp ini SUDAH TERDAFTAR!");

                btn.innerText = "Mendaftarkan...";

                // 1. Buat Akun Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({ email, password: pass });
                if (authError) throw authError;
                
                const newUserId = authData.user.id;

                // 2. Susun Upline
                let k_1 = refCode, k_2 = refCode, k_3 = refCode, k_4 = refCode;
                if (refCode) {
                    const { data: uData } = await supabase.from('users').select('*').eq('id', refCode).single();
                    if (uData) {
                        k_1 = uData.kawan_2 || refCode;
                        k_2 = uData.kawan_3 || refCode;
                        k_3 = uData.kawan_4 || refCode;
                        k_4 = refCode;
                    }
                }

                // 3. Simpan Profil ke public.users
                const { error: dbError } = await supabase.from('users').insert({
                    id: newUserId, nama: nama, email: email, bank: bank, rekening: rek, no_wa: waFinal, 
                    status: 'PENDING', kawan_1: k_1, kawan_2: k_2, kawan_3: k_3, kawan_4: k_4
                });
                if (dbError) throw dbError;

                // 4. Buat 4 Transaksi Menunggu
                const trxData = [
                    { sender_id: newUserId, sender_name: nama, receiver_id: k_1, position: 'kawan_1' },
                    { sender_id: newUserId, sender_name: nama, receiver_id: k_2, position: 'kawan_2' },
                    { sender_id: newUserId, sender_name: nama, receiver_id: k_3, position: 'kawan_3' },
                    { sender_id: newUserId, sender_name: nama, receiver_id: k_4, position: 'kawan_4' }
                ];
                
                const { error: trxError } = await supabase.from('transactions').insert(trxData);
                if(trxError) console.error("Error trx:", trxError);

                showToast("Berhasil! Mengalihkan...", "success");
                setTimeout(() => window.location.href = "dashboard.html", 2000);

            } catch (err) { 
                isRegistering = false; 
                let msg = err.message;
                if(msg.includes("already registered") || msg.includes("already-in-use")) msg = "Email sudah terdaftar!";
                showToast(msg, "error"); 
                btn.innerText = "Gabung Sekarang"; btn.disabled = false; 
            }
        });
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker sukses didaftarkan dengan scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker gagal didaftarkan: ', error);
                    });
            });
        }
    </script>
</body>
</html>
